AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: D-backs ticket draft board backend

Parameters:
  AdminKey:
    Type: String
    NoEcho: true
    Description: Shared secret required in x-admin-key for admin actions.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TICKETS_TABLE: !Ref TicketsTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        ADMIN_KEY: !Ref AdminKey
        WEBSOCKET_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStage}"

Resources:
  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: season
          AttributeType: S
        - AttributeName: ticketId
          AttributeType: S
      KeySchema:
        - AttributeName: season
          KeyType: HASH
        - AttributeName: ticketId
          KeyType: RANGE

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - x-admin-key
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - '*'

  GetTicketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/getTickets.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TicketsTable
      Events:
        GetTickets:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tickets
            Method: GET

  GetDraftConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/getDraftConfig.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TicketsTable
      Events:
        GetDraftConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /draft-config
            Method: GET

  PickTicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/pickTicket.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${WebSocketStage}/POST/@connections/*"
      Events:
        PickTicket:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/pick
            Method: POST

  UnpickTicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/unpickTicket.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${WebSocketStage}/POST/@connections/*"
      Events:
        UnpickTicket:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/unpick
            Method: POST

  ImportTicketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/importTickets.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${WebSocketStage}/POST/@connections/*"
      Events:
        ImportTickets:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/import
            Method: POST

  UpsertDraftConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/upsertDraftConfig.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${WebSocketStage}/POST/@connections/*"
      Events:
        UpsertDraftConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/draft-config
            Method: POST

  RotateAdminKeyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/rotateAdminKey.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
      Events:
        RotateAdminKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/rotate-key
            Method: POST

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: dbacks-ticket-draft-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: prod
      ApiId: !Ref WebSocketApi
      AutoDeploy: true

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/wsConnect.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/wsDisconnect.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${ConnectIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${DisconnectIntegration}

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsConnectFunction
      Principal: apigateway.amazonaws.com

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDisconnectFunction
      Principal: apigateway.amazonaws.com

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebSocketUrl:
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WebSocketStage}"
