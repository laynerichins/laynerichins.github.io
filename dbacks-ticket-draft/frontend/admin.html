<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-backs Ticket Draft Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./config.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Arizona Diamondbacks</p>
      <h1>Ticket Draft Admin</h1>
      <p class="subhead">Use this URL only for draft management.</p>
    </div>
    <div class="status-pill warn" id="connectionStatus">Connecting...</div>
  </header>

  <main class="layout">
    <section class="panel controls">
      <div class="controls-top">
        <h2>Admin Controls</h2>
        <button id="refreshBtn" class="btn subtle">Refresh</button>
      </div>

      <div class="admin-block">
        <div class="control-grid">
          <label>
            Admin key
            <input id="adminKeyInput" type="password" autocomplete="off" placeholder="Enter x-admin-key" />
          </label>
          <label>
            Picked by
            <input id="pickedByInput" type="text" placeholder="Name for this pick" />
          </label>
        </div>
        <button id="saveAdminBtn" class="btn" type="button">Save Admin Session</button>
        <p class="hint" id="adminState">Admin locked. Enter key to enable pick actions.</p>
      </div>

      <hr class="divider" />

      <div class="control-grid">
        <label>
          Season
          <input id="seasonInput" type="text" value="2026" />
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="ALL">All</option>
            <option value="AVAILABLE">Available</option>
            <option value="PICKED">Picked</option>
          </select>
        </label>
        <label>
          Month
          <select id="monthFilter">
            <option value="ALL">All months</option>
          </select>
        </label>
        <label class="checkbox-row">
          <input id="weekendOnly" type="checkbox" />
          Weekend only
        </label>
      </div>

      <details class="team-filter">
        <summary>Teams</summary>
        <div id="teamFilterWrap" class="team-filter-grid"></div>
      </details>

      <div class="view-toggle">
        <button id="viewCalendarBtn" class="btn toggle active" type="button">Calendar View</button>
        <button id="viewListBtn" class="btn toggle" type="button">List View</button>
      </div>

      <div class="summary" id="summary"></div>
    </section>

    <section class="panel board-panel">
      <h2>Schedule</h2>
      <div id="board" class="board"></div>
    </section>

    <aside class="panel side-panel">
      <h2>Draft Clock</h2>
      <div class="clock-card">
        <p><strong>On the clock:</strong> <span id="onClock">Not configured</span></p>
        <p><strong>Up next:</strong> <span id="upNext">Not configured</span></p>
        <p><strong>Picks made:</strong> <span id="picksMade">0</span></p>
      </div>

      <h2>Recent Picks</h2>
      <div id="pickedLog" class="log-list"></div>
    </aside>
  </main>

  <script type="module" src="./admin.js"></script>
</body>
</html>
