<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-backs Ticket Draft Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./config.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand-logos">
        <img class="brand-logo-icon" src="https://images.ctfassets.net/iiozhi00a8lc/4O1qPT7f90sSteCPUr3wwN/e30140f0d3f6a19ce835e916e81c2b3f/A-Logo_Teal_2023.svg" alt="Arizona Diamondbacks logo" />
        <img class="brand-logo-wordmark" src="https://images.ctfassets.net/iiozhi00a8lc/cpeP2f9FLxp0AezqSXIIg/4b39e0b243229c1aa458a75b4ce62280/Arizona_Diamondbacks.svg" alt="Arizona Diamondbacks" />
      </div>
      <p class="eyebrow">Arizona Diamondbacks</p>
      <h1>Live Ticket Draft Board</h1>
      <p class="subhead">View-only board with realtime updates.</p>
    </div>
    <div class="status-pill warn" id="connectionStatus">Connecting...</div>
  </header>

  <main class="layout">
    <section class="panel controls">
      <div class="controls-top">
        <h2>Filters</h2>
        <button id="refreshBtn" class="btn subtle">Refresh</button>
      </div>

      <div class="control-grid">
        <label>
          Season
          <input id="seasonInput" type="text" value="2026" />
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="ALL">All</option>
            <option value="AVAILABLE">Available</option>
            <option value="PICKED">Picked</option>
          </select>
        </label>
        <label>
          Picked by
          <select id="pickedByFilter">
            <option value="ALL">All drafters</option>
            <option value="UNPICKED">Unpicked only</option>
          </select>
        </label>
        <label>
          Month
          <select id="monthFilter">
            <option value="ALL">All months</option>
          </select>
        </label>
        <label class="checkbox-row">
          <input id="weekendOnly" type="checkbox" />
          Weekend only
        </label>
      </div>

      <details class="team-filter">
        <summary>Teams</summary>
        <div id="teamFilterWrap" class="team-filter-grid"></div>
      </details>

      <div class="view-toggle">
        <button id="viewCalendarBtn" class="btn toggle active" type="button">Calendar View</button>
        <button id="viewListBtn" class="btn toggle" type="button">List View</button>
      </div>

      <div class="summary" id="summary"></div>
    </section>

    <section class="panel board-panel">
      <h2>Schedule</h2>
      <div id="board" class="board"></div>
    </section>

    <aside class="panel side-panel">
      <h2>Draft Clock</h2>
      <div class="clock-card">
        <p><strong>On the clock:</strong> <span id="onClock">Not configured</span></p>
        <p><strong>Up next:</strong> <span id="upNext">Not configured</span></p>
        <p><strong>Picks made:</strong> <span id="picksMade">0</span></p>
      </div>

      <h2>Participants</h2>
      <div id="draftParticipants" class="participants"></div>

      <details class="order-panel" open>
        <summary>Total Draft Order</summary>
        <div id="draftOrderList" class="order-list"></div>
      </details>

      <h2>Recent Picks</h2>
      <div id="pickedLog" class="log-list"></div>
    </aside>
  </main>

  <script type="module" src="./viewer.js"></script>
</body>
</html>
